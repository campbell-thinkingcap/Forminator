name: Build and Deploy

on:
  push:
    branches: [main]

env:
  ACR_NAME: forminator
  IMAGE: forminator.azurecr.io/forminator
  CONTAINER_APP: forminator
  RESOURCE_GROUP: rg-sslcheck
  ENVIRONMENT: forminator-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE:${{ github.sha }} \
            --image $IMAGE:latest \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            .

      - name: Deploy to Container Apps
        env:
          AZ_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZ_ACCOUNT_KEY: ${{ secrets.AZURE_ACCOUNT_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MSSQL_HOST: ${{ secrets.MSSQL_HOST }}
          MSSQL_PORT: ${{ secrets.MSSQL_PORT }}
          MSSQL_DATABASE: ${{ secrets.MSSQL_DATABASE }}
          MSSQL_USER: ${{ secrets.MSSQL_USER }}
          MSSQL_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          az containerapp up \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --environment $ENVIRONMENT \
            --image $IMAGE:${{ github.sha }} \
            --registry-server forminator.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 3001 \
            --ingress external \
            --env-vars "AZURE_ACCOUNT_NAME=$AZ_ACCOUNT_NAME" "AZURE_ACCOUNT_KEY=$AZ_ACCOUNT_KEY" "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" "MSSQL_HOST=$MSSQL_HOST" "MSSQL_PORT=$MSSQL_PORT" "MSSQL_DATABASE=$MSSQL_DATABASE" "MSSQL_USER=$MSSQL_USER" "MSSQL_PASSWORD=$MSSQL_PASSWORD"
